<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>工厂三维网格 · 测试台</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Noto+Sans+SC:wght@300;400;500&display=swap');
  :root {
    --bg:#080c10; --panel:#0d1117; --border:#1e2a38;
    --accent:#00d4ff; --accent2:#ff6b35; --green:#39ff14;
    --text:#8b9bb4; --text-hi:#e2eaf6; --error:#ff3b5c;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text-hi); font-family:'Noto Sans SC',sans-serif; height:100vh; display:flex; flex-direction:column; overflow:hidden; }
  header { display:flex; align-items:center; gap:16px; padding:10px 20px; background:var(--panel); border-bottom:1px solid var(--border); flex-shrink:0; }
  .logo { font-family:'JetBrains Mono',monospace; font-size:13px; font-weight:700; letter-spacing:3px; color:var(--accent); }
  .logo span { color:var(--text); font-weight:300; }
  .hdiv { width:1px; height:20px; background:var(--border); }
  .main { display:flex; flex:1; overflow:hidden; }
  .sidebar { width:300px; background:var(--panel); border-right:1px solid var(--border); display:flex; flex-direction:column; overflow-y:auto; flex-shrink:0; }
  .sec { padding:14px; border-bottom:1px solid var(--border); }
  .sec-title { font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:2px; color:var(--text); text-transform:uppercase; margin-bottom:10px; display:flex; align-items:center; gap:6px; }
  .sec-title::before { content:''; width:3px; height:10px; background:var(--accent); display:block; }
  label { display:block; font-size:11px; color:var(--text); margin-bottom:3px; font-family:'JetBrains Mono',monospace; }
  input,select { width:100%; background:var(--bg); border:1px solid var(--border); color:var(--text-hi); padding:7px 9px; font-family:'JetBrains Mono',monospace; font-size:12px; outline:none; transition:border-color .15s; margin-bottom:8px; border-radius:2px; }
  input:focus,select:focus { border-color:var(--accent); }
  .btn { width:100%; padding:9px; background:transparent; border:1px solid var(--accent); color:var(--accent); font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:1px; cursor:pointer; transition:all .15s; text-transform:uppercase; border-radius:2px; }
  .btn:hover { background:var(--accent); color:var(--bg); }
  .btn.red { border-color:var(--error); color:var(--error); }
  .btn.red:hover { background:var(--error); color:#fff; }
  .btn-row { display:flex; gap:6px; }
  .btn-row .btn { flex:1; }
  .stats { display:grid; grid-template-columns:1fr 1fr; gap:6px; }
  .stat { background:var(--bg); border:1px solid var(--border); padding:8px; border-radius:2px; }
  .stat-l { font-family:'JetBrains Mono',monospace; font-size:9px; color:var(--text); letter-spacing:1px; text-transform:uppercase; }
  .stat-v { font-family:'JetBrains Mono',monospace; font-size:20px; font-weight:700; color:var(--accent); }
  .log { font-family:'JetBrains Mono',monospace; font-size:11px; line-height:1.8; max-height:150px; overflow-y:auto; background:var(--bg); border:1px solid var(--border); padding:8px; border-radius:2px; }
  .le { display:flex; gap:6px; }
  .le .ts { color:var(--text); flex-shrink:0; }
  .le.ok .msg { color:var(--green); }
  .le.err .msg { color:var(--error); }
  .le.info .msg { color:var(--accent); }
  .le.warn .msg { color:var(--accent2); }
  .canvas-wrap { flex:1; position:relative; overflow:hidden; }
  #cv { width:100%; height:100%; display:block; }
  .tooltip { position:absolute; pointer-events:none; background:rgba(13,17,23,.96); border:1px solid var(--accent); padding:10px 14px; font-family:'JetBrains Mono',monospace; font-size:11px; line-height:1.8; display:none; z-index:100; min-width:220px; }
  .tt-title { color:var(--accent); font-weight:700; margin-bottom:4px; font-size:12px; }
  .tt-row { display:flex; justify-content:space-between; gap:12px; }
  .tt-key { color:var(--text); } .tt-val { color:var(--text-hi); }
  .corner-info { position:absolute; bottom:16px; right:16px; font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--text); text-align:right; line-height:1.9; pointer-events:none; }
  .loading { position:absolute; inset:0; background:rgba(8,12,16,.85); display:none; align-items:center; justify-content:center; flex-direction:column; gap:12px; z-index:50; }
  .loading.show { display:flex; }
  .spin { width:28px; height:28px; border:2px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin .7s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .loading-txt { font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--accent); letter-spacing:2px; }
  .empty { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:10px; pointer-events:none; }
  .empty-icon { font-size:44px; opacity:.12; }
  .empty-txt { font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--text); opacity:.4; letter-spacing:2px; text-transform:uppercase; }
  ::-webkit-scrollbar { width:4px; } ::-webkit-scrollbar-track { background:var(--bg); } ::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }
</style>
</head>
<body>
<header>
  <div class="logo">GRID<span>·</span>3D <span>// 网格测试台</span></div>
  <div class="hdiv"></div>
  <div style="font-size:11px;color:var(--text);font-family:'JetBrains Mono',monospace">
    服务: <span id="baseDisp" style="color:var(--accent)">-</span>
  </div>
</header>
<div class="main">
  <div class="sidebar">
    <div class="sec">
      <div class="sec-title">接口配置</div>
      <label>BASE URL</label>
      <input id="baseUrl" value="http://127.0.0.1:8888">
    </div>
    <div class="sec">
      <div class="sec-title">场景2 · 模型三维网格</div>
      <label>构件名称 modelName</label>
      <input id="modelName" placeholder="例: jz_lt_07">
      <label>网格级别 level</label>
      <select id="modelLevel">
        <option value="22">22</option><option value="23">23</option>
        <option value="24">24</option><option value="25" selected>25</option>
        <option value="26">26</option><option value="27">27</option>
      </select>
      <button class="btn" id="btnModel">查询模型网格</button>
    </div>
    <div class="sec">
      <div class="sec-title">场景4 · 人员定位</div>
      <label>经度 lng</label><input id="lng" type="number" step="0.00001" placeholder="111.40985">
      <label>纬度 lat</label><input id="lat" type="number" step="0.00001" placeholder="30.55465">
      <label>高度 m</label><input id="ht" type="number" step="0.1" value="30">
      <button class="btn" id="btnPerson">定位</button>
    </div>
    <div class="sec">
      <div class="sec-title">渲染控制</div>
      <div class="btn-row">
        <button class="btn" id="btnReset">重置视角</button>
        <button class="btn red" id="btnClear">清空</button>
      </div>
    </div>
    <div class="sec">
      <div class="sec-title">统计</div>
      <div class="stats">
        <div class="stat"><div class="stat-l">网格</div><div class="stat-v" id="sGrid">0</div></div>
        <div class="stat"><div class="stat-l">层数</div><div class="stat-v" id="sLayer">0</div></div>
        <div class="stat"><div class="stat-l">体块</div><div class="stat-v" id="sBlock">0</div></div>
        <div class="stat"><div class="stat-l">高度跨度</div><div class="stat-v" id="sH" style="font-size:13px;padding-top:4px">-</div></div>
      </div>
    </div>
    <div class="sec">
      <div class="sec-title">日志</div>
      <div class="log" id="log"></div>
    </div>
  </div>

  <div class="canvas-wrap">
    <canvas id="cv"></canvas>
    <div class="empty" id="empty">
      <div class="empty-icon">⬡</div>
      <div class="empty-txt">输入构件名称 · 查询三维网格</div>
      <div class="empty-txt" style="font-size:9px;margin-top:4px">按 F2 加载真实样本数据</div>
    </div>
    <div class="loading" id="loading"><div class="spin"></div><div class="loading-txt">LOADING...</div></div>
    <div class="tooltip" id="tip">
      <div class="tt-title" id="tipTitle">网格信息</div>
      <div class="tt-row"><span class="tt-key">网格编码</span><span class="tt-val" id="tipCode" style="font-size:10px;word-break:break-all">-</span></div>
      <div class="tt-row"><span class="tt-key">序号</span><span class="tt-val" id="tipIdx">-</span></div>
      <div class="tt-row"><span class="tt-key">底部高度</span><span class="tt-val" id="tipH">-</span></div>
      <div class="tt-row"><span class="tt-key">纬度范围</span><span class="tt-val" id="tipLat" style="font-size:10px">-</span></div>
      <div class="tt-row"><span class="tt-key">经度范围</span><span class="tt-val" id="tipLng" style="font-size:10px">-</span></div>
    </div>
    <div class="corner-info">
      <div>左键旋转 · 右键平移 · 滚轮缩放</div>
      <div style="margin-top:4px;color:var(--border)">────────────</div>
      <div>🔵 X → 经度  🔴 Y → 纬度  🟢 Z → 高度</div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ── 日志 ──
const logEl = document.getElementById('log');
function log(msg, t='info') {
  const ts = new Date().toTimeString().slice(0,8);
  const d = document.createElement('div');
  d.className = `le ${t}`;
  d.innerHTML = `<span class="ts">${ts}</span><span class="msg">${msg}</span>`;
  logEl.appendChild(d);
  logEl.scrollTop = logEl.scrollHeight;
}

// ── Three.js ──
const cv = document.getElementById('cv');
const wrap = cv.parentElement;
const renderer = new THREE.WebGLRenderer({canvas:cv, antialias:true});
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setClearColor(0x080c10, 1);

const scene = new THREE.Scene();
scene.add(new THREE.AmbientLight(0xffffff, 0.5));
const dl = new THREE.DirectionalLight(0x00d4ff, 0.8);
dl.position.set(1,1,2); scene.add(dl);

const camera = new THREE.PerspectiveCamera(45, 1, 0.01, 100000);

function resize() {
  const w=wrap.clientWidth, h=wrap.clientHeight;
  renderer.setSize(w,h);
  camera.aspect = w/h;
  camera.updateProjectionMatrix();
}
resize();
window.addEventListener('resize', resize);

// ── 轨道控制 ──
let drag=false, rDrag=false, lx=0, ly=0;
let sph = {theta:0.4, phi:0.7, r:50};
let tgt = new THREE.Vector3();

function applyCamera() {
  camera.position.set(
    tgt.x + sph.r * Math.sin(sph.phi) * Math.sin(sph.theta),
    tgt.y - sph.r * Math.sin(sph.phi) * Math.cos(sph.theta),
    tgt.z + sph.r * Math.cos(sph.phi)
  );
  camera.lookAt(tgt);
}
applyCamera();

cv.addEventListener('mousedown', e=>{ drag=true; rDrag=e.button===2; lx=e.clientX; ly=e.clientY; });
cv.addEventListener('contextmenu', e=>e.preventDefault());
window.addEventListener('mouseup', ()=>drag=false);
window.addEventListener('mousemove', e=>{
  if(!drag) return;
  const dx=e.clientX-lx, dy=e.clientY-ly; lx=e.clientX; ly=e.clientY;
  if(rDrag) {
    const r=new THREE.Vector3(), u=new THREE.Vector3();
    r.crossVectors(camera.getWorldDirection(new THREE.Vector3()), camera.up).normalize();
    u.copy(camera.up).normalize();
    tgt.addScaledVector(r, -dx*sph.r*0.001);
    tgt.addScaledVector(u,  dy*sph.r*0.001);
  } else {
    sph.theta -= dx*0.006;
    sph.phi = Math.max(0.05, Math.min(Math.PI-0.05, sph.phi+dy*0.006));
  }
  applyCamera();
});
cv.addEventListener('wheel', e=>{
  sph.r = Math.max(0.5, sph.r * (1 + e.deltaY*0.001));
  applyCamera();
});

// ── 场景管理 ──
const meshList = [];
let sceneGroup = new THREE.Group();
scene.add(sceneGroup);

function clearScene() {
  scene.remove(sceneGroup);
  sceneGroup = new THREE.Group();
  scene.add(sceneGroup);
  meshList.length = 0;
  document.getElementById('empty').style.display='flex';
  document.getElementById('sGrid').textContent='0';
  document.getElementById('sLayer').textContent='0';
  document.getElementById('sBlock').textContent='0';
  document.getElementById('sH').textContent='-';
}

document.getElementById('btnClear').onclick = clearScene;
document.getElementById('btnReset').onclick = () => {
  const box = new THREE.Box3().setFromObject(sceneGroup);
  if(!box.isEmpty()) {
    box.getCenter(tgt);
    sph.r = box.getSize(new THREE.Vector3()).length() * 1.5;
    sph.theta=0.4; sph.phi=0.7;
    applyCamera();
  }
};

// ── 坐标转换
// 将经纬度高度转换为场景坐标（单位：米，以origin为原点）
function ll2xyz(lat, lng, h, origin) {
  const R = 6378137;
  const x = (lng - origin.lng) * Math.PI/180 * R * Math.cos(origin.lat * Math.PI/180);
  const y = (lat - origin.lat) * Math.PI/180 * R;
  return new THREE.Vector3(x, y, h - origin.h);
}

function getOrigin(gridPoints, baseH) {
  const lats = gridPoints.map(p=>(p[0]+p[2])/2);
  const lngs = gridPoints.map(p=>(p[1]+p[3])/2);
  return {
    lat: lats.reduce((a,b)=>a+b)/lats.length,
    lng: lngs.reduce((a,b)=>a+b)/lngs.length,
    h: baseH   // 以最低层高度为Z=0，避免Z值过大
  };
}

// ── 渲染核心 ──
function renderGrid3d(data, label) {
  if (!data || !data.gridPoints || !data.gridPoints.length) {
    log('数据为空', 'warn'); return;
  }
  const propList = data.propertyList || [];
  if (!propList.length) {
    log('propertyList 为空，无法渲染三维体块', 'warn'); return;
  }

  document.getElementById('empty').style.display='none';

  const gPoints  = data.gridPoints;
  const gCodes   = data.gridCodes || [];
  const gridH    = data.height || 1.9;

  // 以第一层底部高度为Z原点
  const baseH = propList[0][0].height;
  const origin = getOrigin(gPoints, baseH);

  // 用 MeshBasicMaterial 避免光照问题，颜色按层深度变化
  const layerCount = propList.length;
  let blockCount = 0;

  propList.forEach((layerProps, layerIdx) => {
    // 每层颜色从青色→蓝色渐变，区分层次
    const t = layerCount > 1 ? layerIdx / (layerCount - 1) : 0;
    const r = Math.round(t * 0x00 + (1-t) * 0x00);
    const g = Math.round(t * 0x88 + (1-t) * 0xd4);
    const b = Math.round(t * 0xff + (1-t) * 0xff);
    const faceColor = (r<<16)|(g<<8)|b;
    const edgeColor = 0xffffff;

    const matFace = new THREE.MeshBasicMaterial({
      color: faceColor, transparent:true, opacity:0.35,
      side:THREE.DoubleSide, depthWrite:false
    });
    const matEdge = new THREE.LineBasicMaterial({ color: edgeColor, transparent:true, opacity:0.9 });

    layerProps.forEach(prop => {
      const idx = prop.serialNumber;
      const hBot = prop.height;
      const hTop = hBot + gridH;
      if (idx >= gPoints.length) return;

      const pt = gPoints[idx];
      const minLat=pt[0], minLng=pt[1], maxLat=pt[2], maxLng=pt[3];

      const p = [
        ll2xyz(minLat,minLng,hBot,origin),
        ll2xyz(minLat,maxLng,hBot,origin),
        ll2xyz(maxLat,maxLng,hBot,origin),
        ll2xyz(maxLat,minLng,hBot,origin),
        ll2xyz(minLat,minLng,hTop,origin),
        ll2xyz(minLat,maxLng,hTop,origin),
        ll2xyz(maxLat,maxLng,hTop,origin),
        ll2xyz(maxLat,minLng,hTop,origin),
      ];

      // 半透明面
      const faceVerts = [
        p[0],p[1],p[2], p[0],p[2],p[3],
        p[4],p[6],p[5], p[4],p[7],p[6],
        p[0],p[5],p[1], p[0],p[4],p[5],
        p[3],p[2],p[6], p[3],p[6],p[7],
        p[0],p[3],p[7], p[0],p[7],p[4],
        p[1],p[5],p[6], p[1],p[6],p[2],
      ].flatMap(v=>[v.x,v.y,v.z]);
      const fGeo = new THREE.BufferGeometry();
      fGeo.setAttribute('position', new THREE.Float32BufferAttribute(faceVerts, 3));
      const mesh = new THREE.Mesh(fGeo, matFace.clone());
      mesh.userData = { idx, pt, height:hBot, hasModel:prop.hasModel, code:gCodes[idx]||'', label };
      sceneGroup.add(mesh);
      meshList.push(mesh);

      // 棱线（实线，高亮显示体块轮廓）
      const edgeVerts = [
        p[0],p[1], p[1],p[2], p[2],p[3], p[3],p[0],
        p[4],p[5], p[5],p[6], p[6],p[7], p[7],p[4],
        p[0],p[4], p[1],p[5], p[2],p[6], p[3],p[7],
      ].flatMap(v=>[v.x,v.y,v.z]);
      const eGeo = new THREE.BufferGeometry();
      eGeo.setAttribute('position', new THREE.Float32BufferAttribute(edgeVerts, 3));
      sceneGroup.add(new THREE.LineSegments(eGeo, matEdge.clone()));

      blockCount++;
    });
  });

  // 自动对准视角
  const box = new THREE.Box3().setFromObject(sceneGroup);
  box.getCenter(tgt);
  const sz = box.getSize(new THREE.Vector3()).length();
  sph.r = sz * 1.8;
  sph.theta = 0.4; sph.phi = 0.65;
  applyCamera();

  // 统计
  const allH = propList.map(l=>l[0].height);
  const hMin = Math.min(...allH), hMax = Math.max(...allH)+gridH;
  document.getElementById('sGrid').textContent  = gPoints.length;
  document.getElementById('sLayer').textContent = propList.length;
  document.getElementById('sBlock').textContent = blockCount;
  document.getElementById('sH').textContent     = `${(hMax-hMin).toFixed(1)}m`;

  log(`[${label}] 渲染完成：${gPoints.length}网格 × ${propList.length}层 = ${blockCount}体块`, 'ok');
  log(`高度范围: ${hMin.toFixed(2)} ~ ${hMax.toFixed(2)} m`, 'info');
}

// ── Raycasting ──
const ray = new THREE.Raycaster();
const mouse = new THREE.Vector2();
const tip = document.getElementById('tip');
let hovered = null;

cv.addEventListener('mousemove', e=>{
  const rc = cv.getBoundingClientRect();
  mouse.x = ((e.clientX-rc.left)/rc.width)*2-1;
  mouse.y =-((e.clientY-rc.top)/rc.height)*2+1;
  ray.setFromCamera(mouse, camera);
  const hits = ray.intersectObjects(meshList);
  if(hits.length) {
    const m = hits[0].object;
    if(m!==hovered) {
      if(hovered) hovered.material.color.setHex(hovered._origColor);
      hovered=m;
      hovered._origColor = m.material.color.getHex();
      m.material.color.setHex(0xffff00);
    }
    const ud=m.userData, pt=ud.pt;
    document.getElementById('tipTitle').textContent = ud.label||'网格';
    document.getElementById('tipCode').textContent  = ud.code||'-';
    document.getElementById('tipIdx').textContent   = ud.idx;
    document.getElementById('tipH').textContent     = ud.height?.toFixed(3)+' m';
    document.getElementById('tipLat').textContent   = pt?`${pt[0].toFixed(7)} ~ ${pt[2].toFixed(7)}`:'-';
    document.getElementById('tipLng').textContent   = pt?`${pt[1].toFixed(7)} ~ ${pt[3].toFixed(7)}`:'-';
    tip.style.display='block';
    tip.style.left=(e.clientX-rc.left+14)+'px';
    tip.style.top =(e.clientY-rc.top +14)+'px';
  } else {
    if(hovered){hovered.material.color.setHex(hovered._origColor);hovered=null;}
    tip.style.display='none';
  }
});

// ── 接口调用 ──
const getBase = ()=>document.getElementById('baseUrl').value.replace(/\/$/,'');
const showLoad = v=>document.getElementById('loading').classList.toggle('show',v);

document.getElementById('btnModel').onclick = async()=>{
  const name = document.getElementById('modelName').value.trim();
  const level= document.getElementById('modelLevel').value;
  if(!name){log('请输入构件名称','err');return;}
  showLoad(true);
  log(`查询 [${name}] level=${level} ...`,'info');
  try {
    const url=`/zwyl/grid/model?modelName=${encodeURIComponent(name)}&level=${level}`;
    const res=await fetch(url);
    if(!res.ok) throw new Error(`HTTP ${res.status}`);
    const resData=await res.json();
    let data = resData;
    if (resData && resData.code === 200 && resData.data) {
      data = resData.data;
    }
    log(`返回 ${data.gridPoints?.length||0} 个网格，${data.propertyList?.length||0} 层`,'ok');
    clearScene();
    renderGrid3d(data, `${name}@lv${level}`);
  } catch(e){log(`失败: ${e.message}`,'err');}
  finally{showLoad(false);}
};

document.getElementById('btnPerson').onclick = async()=>{
  const lng=document.getElementById('lng').value;
  const lat=document.getElementById('lat').value;
  const ht =document.getElementById('ht').value;
  if(!lng||!lat){log('请输入经纬度','err');return;}
  showLoad(true);
  log(`定位 [${lng},${lat}] h=${ht}m`,'info');
  try {
    const url=`/zwyl/grid/person?lng=${lng}&lat=${lat}&height=${ht}`;
    const res=await fetch(url);
    if(!res.ok) throw new Error(`HTTP ${res.status}`);
    const resData=await res.json();
    let data = resData;
    if (resData && resData.code === 200 && resData.data) {
      data = resData.data;
