<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>网格纯净渲染测试</title>
  <link type="text/css" rel="stylesheet" href="/gs3d/lib/CesiumChanged/Widgets/widgets.css">
  <script src="/gs3d/lib/CesiumChanged/Cesium.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <style>
    html, body, #cesiumContainer {
      width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden;
    }
    #ui {
      position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.7); 
      padding: 15px; border-radius: 4px; color: white; z-index: 1000;
      font-family: sans-serif;
    }
    input, button { padding: 5px; margin-top: 5px; }
  </style>
</head>
<body>
  <div id="cesiumContainer"></div>
  <div id="ui">
    <h3>网格渲染 Demo (无模型干扰)</h3>
    <label>Model Name / TagName:</label><br/>
    <!-- 默认用其中一个测试设备名 -->
    <input type="text" id="modelName" value="qq_txkz_87_txkz_159" style="width:200px;" />
    <button onclick="fetchAndRender()">渲染网格</button>
  </div>

  <script>
    // 1. 初始化单纯的 Cesium 球体，无模型加载，无特效
    const viewer = new Cesium.Viewer('cesiumContainer', {
      imageryProvider: new Cesium.GridImageryProvider(),
      baseLayerPicker: false,
      geocoder: false,
      homeButton: false,
      infoBox: false,
      navigationHelpButton: false,
      sceneModePicker: false,
      timeline: false,
      animation: false
    });
    
    // 关闭深度检测以避免地表遮挡
    viewer.scene.globe.depthTestAgainstTerrain = false;

    // 清空默认背景和大气
    viewer.scene.backgroundColor = Cesium.Color.fromCssColorString('#0a1628');
    viewer.scene.globe.baseColor = Cesium.Color.fromCssColorString('#0a1628');
    // viewer.scene.skyBox.show = false;
    viewer.scene.skyAtmosphere.show = false;

    let gridEntities = [];

    async function fetchAndRender() {
      const modelName = document.getElementById('modelName').value.trim();
      if (!modelName) {
        alert("请输入 modelName");
        return;
      }
      
      try {
        // 清除旧的实体
        gridEntities.forEach(e => viewer.entities.remove(e));
        gridEntities = [];

        console.log(`[Demo] 正在获取 ${modelName} 的网格数据...`);
        // 使用与 Vue 代码里相同的接口，由于是在 Vite dev server 下直接访问，/zwyl 会被正确代理
        const res = await axios.get(`/zwyl/grid/model?modelName=${modelName}&level=24&demTag=false`);
        
        let data = res.data;
        if(res.data && res.data.code === 200 && res.data.data) {
           data = res.data.data;
        }

        renderGrid(data);

      } catch (err) {
        console.error("接口请求失败:", err);
        alert(`接口请求失败: ${err.message}`);
      }
    }

    // copy 于 DevicesListPoi.vue L180 开始的 renderGrid
    function renderGrid(data) {
      if (!data) return;
      const { gridPoints, height: gridH, propertyList } = data;
      
      if (!gridPoints || !gridPoints.length || !propertyList || !propertyList.length) {
         console.warn("数据无效", data);
         alert("从接口返回的数据为空或结构不正确。");
         return;
      }

      console.log(`[Demo] 数据获取成功: 网格点数 ${gridPoints.length}, 属性层数 ${propertyList.length}`);

      // 清除旧的 primitive
      viewer.scene.primitives.removeAll();

      const polygonInstances = [];
      const polylineInstances = [];

      // 半透明青色面
      const faceColor = Cesium.ColorGeometryInstanceAttribute.fromColor(
        Cesium.Color.fromCssColorString('rgba(0, 255, 255, 0.15)')
      );
      // 实线青色边框
      const lineColor = Cesium.ColorGeometryInstanceAttribute.fromColor(
        Cesium.Color.CYAN.withAlpha(0.6)
      );

      propertyList.forEach((layerProps) => {
        layerProps.forEach((prop) => {
          const idx = prop.serialNumber;
          if (idx >= gridPoints.length) return;

          const pt = gridPoints[idx];
          const south = pt[0], west = pt[1], north = pt[2], east = pt[3];
          const hBot = prop.height;
          const hTop = hBot + gridH;

          // 顶面
          const topPositions = Cesium.Cartesian3.fromDegreesArrayHeights([
            west, south, hTop,  east, south, hTop,
            east, north, hTop,  west, north, hTop
          ]);
          polygonInstances.push(new Cesium.GeometryInstance({
            geometry: new Cesium.PolygonGeometry({
              polygonHierarchy: new Cesium.PolygonHierarchy(topPositions),
              perPositionHeight: true
            }),
            attributes: { color: faceColor }
          }));

          // 底面
          const botPositions = Cesium.Cartesian3.fromDegreesArrayHeights([
            west, south, hBot,  east, south, hBot,
            east, north, hBot,  west, north, hBot
          ]);
          polygonInstances.push(new Cesium.GeometryInstance({
            geometry: new Cesium.PolygonGeometry({
              polygonHierarchy: new Cesium.PolygonHierarchy(botPositions),
              perPositionHeight: true
            }),
            attributes: { color: faceColor }
          }));

          // 底部边框
          const botLinePositions = Cesium.Cartesian3.fromDegreesArrayHeights([
            west, south, hBot,  east, south, hBot,
            east, north, hBot,  west, north, hBot,  west, south, hBot
          ]);
          polylineInstances.push(new Cesium.GeometryInstance({
            geometry: new Cesium.SimplePolylineGeometry({
              positions: botLinePositions,
              colorsPerVertex: false
            }),
            attributes: { color: lineColor }
          }));

          // 顶部边框
          const topLinePositions = Cesium.Cartesian3.fromDegreesArrayHeights([
            west, south, hTop,  east, south, hTop,
            east, north, hTop,  west, north, hTop,  west, south, hTop
          ]);
          polylineInstances.push(new Cesium.GeometryInstance({
            geometry: new Cesium.SimplePolylineGeometry({
              positions: topLinePositions,
              colorsPerVertex: false
            }),
            attributes: { color: lineColor }
          }));

          // 4条垂直棱边
          [[west, south], [east, south], [east, north], [west, north]].forEach(coord => {
            polylineInstances.push(new Cesium.GeometryInstance({
              geometry: new Cesium.SimplePolylineGeometry({
                positions: Cesium.Cartesian3.fromDegreesArrayHeights([
                  coord[0], coord[1], hBot, 
                  coord[0], coord[1], hTop
                ]),
                colorsPerVertex: false
              }),
              attributes: { color: lineColor }
            }));
          });
        });
      });

      // 面的 Primitive
      const polygonsPrimitive = new Cesium.Primitive({
        geometryInstances: polygonInstances,
        appearance: new Cesium.PerInstanceColorAppearance({
          flat: true, // 无光照
          translucent: true
        }),
        asynchronous: true
      });

      // 线的 Primitive
      const polylinesPrimitive = new Cesium.Primitive({
        geometryInstances: polylineInstances,
        appearance: new Cesium.PerInstanceColorAppearance({
          flat: true,
          renderState: {
            // 线宽限制在显卡最大允许范围内
            lineWidth: Math.min(2.0, viewer.scene.maximumAliasedLineWidth || 1.0)
          }
        }),
        asynchronous: true
      });

      viewer.scene.primitives.add(polygonsPrimitive);
      viewer.scene.primitives.add(polylinesPrimitive);

      // 视角飞向网格 (使用数组第一个网格的中心点近似定位)
      if (gridPoints.length > 0) {
        const centerLon = (gridPoints[0][1] + gridPoints[0][3]) / 2;
        const centerLat = (gridPoints[0][0] + gridPoints[0][2]) / 2;
        const baseH = propertyList[0][0].height;

        viewer.camera.flyTo({
          destination: Cesium.Cartesian3.fromDegrees(
            centerLon,
            centerLat - 0.0015, // 稍微南移
            baseH + 150
          ),
          orientation: {
            heading: Cesium.Math.toRadians(0),
            pitch: Cesium.Math.toRadians(-35),
            roll: 0.0
          },
          duration: 2.0
        });
      }
    }
  </script>
</body>
</html>
